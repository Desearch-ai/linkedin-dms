<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=340" />
  <title>Desearch LinkedIn Bridge</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="header">
    <h1>Desearch LinkedIn Bridge</h1>
    <span class="status-badge status-disconnected" id="statusBadge">Disconnected</span>
  </div>

  <div class="status-card">
    <div class="status-row">
      <span class="status-label">Account ID</span>
      <span class="status-value" id="accountId">—</span>
    </div>
    <div class="status-row">
      <span class="status-label">Cookie</span>
      <span class="status-value" id="cookieStatus">—</span>
    </div>
    <div class="status-row">
      <span class="status-label">Headers captured</span>
      <span class="status-value" id="headersStatus">—</span>
    </div>
    <div class="status-row">
      <span class="status-label">Last updated</span>
      <span class="status-value" id="lastUpdated">—</span>
    </div>
  </div>

  <div class="config-section">
    <label for="backendUrl">Service URL</label>
    <div class="url-row">
      <input type="url" id="backendUrl" placeholder="http://localhost:8899" />
      <button class="btn-secondary" id="btnSaveConfig">Save</button>
    </div>
    <small class="health-hint" id="healthStatus"></small>
  </div>

  <div class="btn-row">
    <button class="btn-primary" id="btnSync">Sync Now</button>
    <button class="btn-secondary" id="btnRefresh">Refresh Cookies</button>
  </div>

  <div id="result"></div>

  <div class="footer">
    <button class="btn-danger" id="btnDisconnect" style="width:100%">Disconnect</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
